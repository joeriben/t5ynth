name: Build T5ynth

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── macOS (Apple Silicon + Intel Universal) ──────────────────────
  macos:
    runs-on: macos-14   # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install system dependencies
        run: brew install cmake

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -r backend/requirements.txt

      - name: Bundle Python backend (PyInstaller)
        working-directory: backend
        run: pyinstaller pipe_inference.spec --noconfirm

      - name: Verify bundled binary starts
        working-directory: backend
        run: |
          # Quick smoke test — binary should print to stderr and wait for stdin
          timeout 10 ./dist/pipe_inference/pipe_inference < /dev/null 2>&1 || true

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j$(sysctl -n hw.ncpu)

      - name: Assemble app bundle
        run: |
          APP=build/T5ynth_artefacts/Release/Standalone/T5ynth.app
          # Copy bundled backend into app Resources
          mkdir -p "$APP/Contents/Resources/backend"
          cp -R backend/dist/pipe_inference/* "$APP/Contents/Resources/backend/"

      - name: Smoke-test app bundle
        run: |
          APP=build/T5ynth_artefacts/Release/Standalone/T5ynth.app
          # Verify binary is executable
          test -x "$APP/Contents/MacOS/T5ynth"
          # Verify backend is executable
          test -x "$APP/Contents/Resources/backend/pipe_inference"
          # Check dylib dependencies resolve
          otool -L "$APP/Contents/MacOS/T5ynth"
          # Try to launch — kill after 5s, exit 0 if it stayed alive (success)
          "$APP/Contents/MacOS/T5ynth" &
          APP_PID=$!
          sleep 5
          if kill -0 "$APP_PID" 2>/dev/null; then
            echo "App launched successfully (PID $APP_PID)"
            kill "$APP_PID" || true
          else
            wait "$APP_PID" || EXIT_CODE=$?
            echo "App exited with code ${EXIT_CODE:-unknown} — check logs above"
            exit 1
          fi

      # tar on the build machine to preserve Unix permissions (+x bits)
      # upload-artifact strips permissions — the release job uses these archives directly
      - name: Create archives
        run: |
          mkdir -p archives
          # Include license files alongside binaries
          for d in build/T5ynth_artefacts/Release/Standalone \
                   build/T5ynth_artefacts/Release/VST3 \
                   build/T5ynth_artefacts/Release/AU; do
            cp LICENSE THIRD_PARTY_LICENSES.md "$d/"
          done
          tar -cJf archives/T5ynth-macOS-Standalone.tar.xz \
            -C build/T5ynth_artefacts/Release/Standalone T5ynth.app LICENSE THIRD_PARTY_LICENSES.md
          tar -cJf archives/T5ynth-macOS-VST3.tar.xz \
            -C build/T5ynth_artefacts/Release/VST3 .
          tar -cJf archives/T5ynth-macOS-AU.tar.xz \
            -C build/T5ynth_artefacts/Release/AU .
          ls -lh archives/

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: T5ynth-macOS-Standalone
          path: archives/T5ynth-macOS-Standalone.tar.xz

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: T5ynth-macOS-VST3
          path: archives/T5ynth-macOS-VST3.tar.xz

      - name: Upload AU
        uses: actions/upload-artifact@v4
        with:
          name: T5ynth-macOS-AU
          path: archives/T5ynth-macOS-AU.tar.xz

  # ── Windows ─────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install torch --index-url https://download.pytorch.org/whl/cu124
          pip install -r backend/requirements.txt

      - name: Bundle Python backend (PyInstaller)
        working-directory: backend
        run: pyinstaller pipe_inference.spec --noconfirm

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Assemble distribution
        shell: bash
        run: |
          mkdir -p dist/T5ynth
          cp -R build/T5ynth_artefacts/Release/Standalone/* dist/T5ynth/
          mkdir -p dist/T5ynth/backend
          cp -R backend/dist/pipe_inference/* dist/T5ynth/backend/
          cp LICENSE THIRD_PARTY_LICENSES.md dist/T5ynth/

      - name: Create archives
        shell: bash
        run: |
          mkdir -p archives
          cp LICENSE THIRD_PARTY_LICENSES.md build/T5ynth_artefacts/Release/VST3/
          tar -cJf archives/T5ynth-Windows-Standalone.tar.xz -C dist T5ynth
          tar -cJf archives/T5ynth-Windows-VST3.tar.xz \
            -C build/T5ynth_artefacts/Release/VST3 .
          ls -lh archives/

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: T5ynth-Windows-Standalone
          path: archives/T5ynth-Windows-Standalone.tar.xz

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: T5ynth-Windows-VST3
          path: archives/T5ynth-Windows-VST3.tar.xz

  # ── Linux ───────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Expand swap space
        run: |
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential \
            libasound2-dev libcurl4-openssl-dev libfreetype-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev \
            libxcomposite-dev libxext-dev libxrender-dev libfontconfig1-dev \
            libwebkit2gtk-4.1-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install torch --index-url https://download.pytorch.org/whl/cu124
          pip install -r backend/requirements.txt

      - name: Bundle Python backend (PyInstaller)
        working-directory: backend
        run: pyinstaller pipe_inference.spec --noconfirm

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Assemble distribution
        run: |
          mkdir -p dist/T5ynth
          cp build/T5ynth_artefacts/Release/Standalone/T5ynth dist/T5ynth/
          mkdir -p dist/T5ynth/backend
          cp -R backend/dist/pipe_inference/* dist/T5ynth/backend/
          cp LICENSE THIRD_PARTY_LICENSES.md dist/T5ynth/

      - name: Create archives
        run: |
          mkdir -p archives
          cp LICENSE THIRD_PARTY_LICENSES.md build/T5ynth_artefacts/Release/VST3/
          tar -cJf archives/T5ynth-Linux-Standalone.tar.xz -C dist T5ynth
          tar -cJf archives/T5ynth-Linux-VST3.tar.xz \
            -C build/T5ynth_artefacts/Release/VST3 .
          ls -lh archives/

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: T5ynth-Linux-Standalone
          path: archives/T5ynth-Linux-Standalone.tar.xz

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: T5ynth-Linux-VST3
          path: archives/T5ynth-Linux-VST3.tar.xz

  # ── Release (only on tags) ──────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos, windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Archives are pre-built on each platform to preserve Unix permissions
      - name: Collect archives
        run: |
          mkdir -p release
          find artifacts -name '*.tar.xz' -exec mv {} release/ \;
          ls -lh release/

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp .github/release_notes_header.md release_notes.md
          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ github.ref_name }}" \
            --jq '.body' >> release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            release/*.tar.xz \
            --title "T5ynth ${{ github.ref_name }}" \
            --notes-file release_notes.md \
            --prerelease
