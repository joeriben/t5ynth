name: Build T5ynth

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── macOS (Apple Silicon + Intel Universal) ──────────────────────
  macos:
    runs-on: macos-14   # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install system dependencies
        run: brew install cmake

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -r backend/requirements.txt

      - name: Bundle Python backend (PyInstaller)
        working-directory: backend
        run: pyinstaller pipe_inference.spec --noconfirm

      - name: Verify bundled binary starts
        working-directory: backend
        run: |
          # Smoke test: binary must start and produce output (not crash on import).
          # No 'timeout' on macOS — run in background with kill fallback.
          ./dist/pipe_inference/pipe_inference < /dev/null > /tmp/be_out.log 2>&1 &
          PID=$!
          for i in $(seq 30); do
            if ! kill -0 $PID 2>/dev/null; then break; fi
            sleep 1
          done
          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null || true
          if grep -q "Ready\|devices\|No model" /tmp/be_out.log; then
            echo "Backend smoke test passed"
          else
            echo "::error::Backend binary failed to reach ready state"
            cat /tmp/be_out.log
            exit 1
          fi

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DT5YNTH_MACOS_STANDALONE_ONLY=ON

      - name: Build
        run: cmake --build build --config Release -j$(sysctl -n hw.ncpu)

      - name: Assemble app bundle
        run: |
          APP=build/T5ynth_artefacts/Release/Standalone/T5ynth.app
          # Copy bundled backend into app Resources
          mkdir -p "$APP/Contents/Resources/backend"
          cp -R backend/dist/pipe_inference/* "$APP/Contents/Resources/backend/"
          # Re-sign the entire bundle (adding backend invalidated the JUCE ad-hoc signature)
          codesign --force --deep --sign - "$APP"

      - name: Smoke-test app bundle
        run: |
          APP=build/T5ynth_artefacts/Release/Standalone/T5ynth.app
          # Verify binary is executable
          test -x "$APP/Contents/MacOS/T5ynth"
          # Verify backend is executable
          test -x "$APP/Contents/Resources/backend/pipe_inference"
          # Check dylib dependencies resolve
          otool -L "$APP/Contents/MacOS/T5ynth"
          # Try to launch — kill after 5s, exit 0 if it stayed alive (success)
          "$APP/Contents/MacOS/T5ynth" &
          APP_PID=$!
          sleep 5
          if kill -0 "$APP_PID" 2>/dev/null; then
            echo "App launched successfully (PID $APP_PID)"
            kill "$APP_PID" || true
          else
            wait "$APP_PID" || EXIT_CODE=$?
            echo "App exited with code ${EXIT_CODE:-unknown} — check logs above"
            exit 1
          fi

      - name: Import Developer ID certificates
        env:
          APP_CERT_P12_BASE64: ${{ secrets.MACOS_APP_CERT_P12_BASE64 }}
          APP_CERT_P12_PASSWORD: ${{ secrets.MACOS_APP_CERT_P12_PASSWORD }}
          PKG_CERT_P12_BASE64: ${{ secrets.MACOS_PKG_CERT_P12_BASE64 }}
          PKG_CERT_P12_PASSWORD: ${{ secrets.MACOS_PKG_CERT_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$APP_CERT_P12_BASE64" || -z "$APP_CERT_P12_PASSWORD" || -z "$PKG_CERT_P12_BASE64" || -z "$PKG_CERT_P12_PASSWORD" || -z "$KEYCHAIN_PASSWORD" ]]; then
            echo "Developer ID signing secrets not fully configured; skipping certificate import."
            exit 0
          fi

          KEYCHAIN="$RUNNER_TEMP/t5ynth-signing.keychain-db"
          APP_CERT="$RUNNER_TEMP/developer-id-application.p12"
          PKG_CERT="$RUNNER_TEMP/developer-id-installer.p12"

          printf '%s' "$APP_CERT_P12_BASE64" | base64 --decode > "$APP_CERT"
          printf '%s' "$PKG_CERT_P12_BASE64" | base64 --decode > "$PKG_CERT"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security default-keychain -s "$KEYCHAIN"

          security import "$APP_CERT" -k "$KEYCHAIN" -P "$APP_CERT_P12_PASSWORD" -T /usr/bin/codesign
          security import "$PKG_CERT" -k "$KEYCHAIN" -P "$PKG_CERT_P12_PASSWORD" -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          APP_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" | sed -n 's/.*\"\\(Developer ID Application:[^\"]*\\)\".*/\\1/p' | head -n 1)"
          PKG_IDENTITY="$(security find-identity -v -p basic "$KEYCHAIN" | sed -n 's/.*\"\\(Developer ID Installer:[^\"]*\\)\".*/\\1/p' | head -n 1)"

          test -n "$APP_IDENTITY"
          test -n "$PKG_IDENTITY"

          echo "MACOS_APP_SIGN_IDENTITY=$APP_IDENTITY" >> "$GITHUB_ENV"
          echo "MACOS_PKG_SIGN_IDENTITY=$PKG_IDENTITY" >> "$GITHUB_ENV"

      - name: Prepare notary API key
        env:
          MACOS_NOTARY_API_PRIVATE_KEY: ${{ secrets.MACOS_NOTARY_API_PRIVATE_KEY }}
          MACOS_NOTARY_API_KEY_ID: ${{ secrets.MACOS_NOTARY_API_KEY_ID }}
          MACOS_NOTARY_API_ISSUER: ${{ secrets.MACOS_NOTARY_API_ISSUER }}
        run: |
          if [[ -z "$MACOS_NOTARY_API_PRIVATE_KEY" || -z "$MACOS_NOTARY_API_KEY_ID" || -z "$MACOS_NOTARY_API_ISSUER" ]]; then
            echo "Notary API secrets not fully configured; skipping API key preparation."
            exit 0
          fi

          KEY_PATH="$RUNNER_TEMP/AuthKey_${MACOS_NOTARY_API_KEY_ID}.p8"
          printf '%s' "$MACOS_NOTARY_API_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "MACOS_NOTARY_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      # macOS releases are installer-only for now; just create the output dir
      # before building the .pkg.
      - name: Prepare macOS release staging
        run: |
          mkdir -p archives

      - name: Build macOS installer (.pkg)
        env:
          MACOS_APP_SIGN_IDENTITY: ${{ env.MACOS_APP_SIGN_IDENTITY }}
          MACOS_PKG_SIGN_IDENTITY: ${{ env.MACOS_PKG_SIGN_IDENTITY }}
          MACOS_NOTARY_KEYCHAIN_PROFILE: ${{ secrets.MACOS_NOTARY_KEYCHAIN_PROFILE }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_API_KEY_PATH: ${{ env.MACOS_NOTARY_API_KEY_PATH }}
          MACOS_NOTARY_API_KEY_ID: ${{ secrets.MACOS_NOTARY_API_KEY_ID }}
          MACOS_NOTARY_API_ISSUER: ${{ secrets.MACOS_NOTARY_API_ISSUER }}
        run: |
          chmod +x installer/macos/build_pkg.sh
          installer/macos/build_pkg.sh \
            --app   build/T5ynth_artefacts/Release/Standalone/T5ynth.app \
            --presets resources/presets \
            --version "${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '0.0.0-alpha.0' }}" \
            --output archives/T5ynth-macOS-Installer.pkg

      - name: Upload macOS Installer
        uses: actions/upload-artifact@v4
        with:
          name: T5ynth-macOS-Installer
          path: archives/T5ynth-macOS-Installer.pkg

  # ── Windows ─────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install torch==2.7.1 torchaudio==2.7.1 torchvision==0.22.1 --index-url https://download.pytorch.org/whl/cu128
          pip install -r backend/requirements.txt

      - name: Bundle Python backend (PyInstaller)
        working-directory: backend
        run: pyinstaller pipe_inference.spec --noconfirm

      - name: Verify bundled backend starts
        shell: powershell
        working-directory: backend
        env:
          T5YNTH_ALLOW_NO_MODELS: "1"
        run: |
          $backendExe = (Resolve-Path ".\dist\pipe_inference\pipe_inference.exe").Path
          $stdoutLog = Join-Path $env:RUNNER_TEMP "t5ynth_backend_stdout.log"
          $stderrLog = Join-Path $env:RUNNER_TEMP "t5ynth_backend_stderr.log"
          $proc = Start-Process $backendExe `
            -WorkingDirectory (Get-Location).Path `
            -RedirectStandardOutput $stdoutLog `
            -RedirectStandardError $stderrLog `
            -PassThru
          Start-Sleep -Seconds 5
          if ($proc.HasExited) {
            $stdoutBytes = if (Test-Path $stdoutLog) { [System.IO.File]::ReadAllBytes($stdoutLog) } else { @() }
            $stderrText = if (Test-Path $stderrLog) { Get-Content $stderrLog -Raw } else { "" }
            $stdoutText = if ($stdoutBytes.Length -gt 0) { [System.Text.Encoding]::UTF8.GetString($stdoutBytes) } else { "" }
            $sentReadyFrame = $stdoutBytes.Length -gt 0 -and $stdoutBytes[0] -eq 2 -and $stdoutText.Contains('"devices"')
            $smokeTestNotice = $stderrText.Contains("smoke-test mode")
            if ($sentReadyFrame -and $smokeTestNotice) {
              Write-Host "Bundled backend emitted ready frame and exited after smoke-test startup."
              exit 0
            }
            Write-Host "::error::Bundled backend exited early with code $($proc.ExitCode)"
            if ($stdoutText) { Write-Host $stdoutText }
            if ($stderrText) { Write-Host $stderrText }
            exit 1
          }
          Stop-Process -Id $proc.Id -Force

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Assemble distribution
        shell: bash
        run: |
          mkdir -p dist/T5ynth
          cp -R build/T5ynth_artefacts/Release/Standalone/* dist/T5ynth/
          mkdir -p dist/T5ynth/backend
          cp -R backend/dist/pipe_inference/* dist/T5ynth/backend/
          cp LICENSE.txt THIRD_PARTY_LICENSES.txt dist/T5ynth/

      - name: Smoke-test Windows standalone
        shell: powershell
        env:
          T5YNTH_ALLOW_NO_MODELS: "1"
        run: |
          $env:T5YNTH_REQUIRE_BUNDLED_BACKEND = "1"
          $appExe = (Resolve-Path ".\dist\T5ynth\T5ynth.exe").Path
          $proc = Start-Process $appExe `
            -WorkingDirectory (Split-Path -Parent $appExe) `
            -PassThru
          Start-Sleep -Seconds 5
          if ($proc.HasExited) {
            Write-Host "::error::Standalone app exited early with code $($proc.ExitCode)"
            exit 1
          }
          Stop-Process -Id $proc.Id -Force

      - name: Create archives
        shell: bash
        run: |
          mkdir -p archives
          cp LICENSE.txt THIRD_PARTY_LICENSES.txt build/T5ynth_artefacts/Release/VST3/
          tar -cJf archives/T5ynth-Windows-Standalone.tar.xz -C dist T5ynth
          tar -cJf archives/T5ynth-Windows-VST3.tar.xz \
            -C build/T5ynth_artefacts/Release/VST3 .
          ls -lh archives/

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: T5ynth-Windows-Standalone
          path: archives/T5ynth-Windows-Standalone.tar.xz

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: T5ynth-Windows-VST3
          path: archives/T5ynth-Windows-VST3.tar.xz

      - name: Ensure Inno Setup is available
        shell: powershell
        run: |
          $isccPath = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\iscc.exe"
          if (Test-Path $isccPath) {
            Write-Host "Using preinstalled Inno Setup at $isccPath"
            exit 0
          }
          choco install innosetup -y
          if (-not (Test-Path $isccPath)) {
            Write-Host "::error::Inno Setup was not found after installation"
            exit 1
          }

      - name: Build Windows installer (Inno Setup)
        shell: powershell
        run: |
          $VERSION = "${{ github.ref_name }}" -replace '^v', ''
          if (-not $VERSION) { $VERSION = "0.0.0-dev" }
          $isccPath = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\iscc.exe"
          & $isccPath /DAppVersion="$VERSION" `
               /DStandaloneDir="..\..\dist\T5ynth" `
               /DVST3Dir="..\..\build\T5ynth_artefacts\Release\VST3" `
               /DPresetsDir="..\..\resources\presets" `
               /O"archives" `
               installer\windows\t5ynth.iss

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: T5ynth-Windows-Installer
          path: archives/T5ynth-Windows-Setup.exe

  # ── Linux Base Artifacts + Ubuntu DEB (Ubuntu x86_64) ──────────
  linux:
    name: Linux Base Artifacts + Ubuntu DEB (Ubuntu x86_64)
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Expand swap space
        run: |
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential patchelf \
            libasound2-dev libcurl4-openssl-dev libfreetype-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev \
            libxcomposite-dev libxext-dev libxrender-dev libfontconfig1-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install torch==2.7.1 torchaudio==2.7.1 torchvision==0.22.1 --index-url https://download.pytorch.org/whl/cu128
          pip install -r backend/requirements.txt

      - name: Bundle Python backend (PyInstaller)
        working-directory: backend
        run: pyinstaller pipe_inference.spec --noconfirm

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Assemble base distribution
        run: |
          mkdir -p dist/T5ynth
          cp build/T5ynth_artefacts/Release/Standalone/T5ynth dist/T5ynth/
          mkdir -p dist/T5ynth/backend
          cp -R backend/dist/pipe_inference/* dist/T5ynth/backend/
          cp LICENSE.txt THIRD_PARTY_LICENSES.txt dist/T5ynth/

      - name: Verify Linux artifact architecture
        run: |
          test -x dist/T5ynth/T5ynth
          test -x dist/T5ynth/backend/pipe_inference
          file dist/T5ynth/T5ynth | tee /tmp/t5ynth-file.txt
          file dist/T5ynth/backend/pipe_inference | tee /tmp/pipe-file.txt
          grep -Eq 'ELF 64-bit.*x86-64' /tmp/t5ynth-file.txt
          grep -Eq 'ELF 64-bit.*x86-64' /tmp/pipe-file.txt

      - name: Create archives
        run: |
          mkdir -p archives
          cp LICENSE.txt THIRD_PARTY_LICENSES.txt build/T5ynth_artefacts/Release/VST3/
          tar -cJf archives/T5ynth-Linux-Base-x86_64-Standalone.tar.xz -C dist T5ynth
          tar -cJf archives/T5ynth-Linux-Base-x86_64-VST3.tar.xz \
            -C build/T5ynth_artefacts/Release/VST3 .
          ls -lh archives/

      - name: Stage Ubuntu backend bundle
        run: |
          installer/linux/stage_backend_bundle.sh --bundle-id ubuntu24.04-x86_64-cuda

      - name: Build Ubuntu DEB
        run: |
          installer/linux/build_deb.sh --skip-build --build-dir build --bundle-id ubuntu24.04-x86_64-cuda

      - name: Verify Ubuntu DEB
        run: |
          DEB="$(find archives/deb -maxdepth 1 -type f -name '*.deb' | head -n 1)"
          test -n "$DEB"
          file "$DEB"
          ar t "$DEB" | tee /tmp/t5ynth-deb-members.txt
          grep -qx 'debian-binary' /tmp/t5ynth-deb-members.txt
          grep -qx 'control.tar.gz' /tmp/t5ynth-deb-members.txt
          grep -qx 'data.tar.xz' /tmp/t5ynth-deb-members.txt

      - name: Upload Linux Base Standalone
        uses: actions/upload-artifact@v4
        with:
          name: T5ynth-Linux-Base-x86_64-Standalone
          path: archives/T5ynth-Linux-Base-x86_64-Standalone.tar.xz

      - name: Upload Linux Base VST3
        uses: actions/upload-artifact@v4
        with:
          name: T5ynth-Linux-Base-x86_64-VST3
          path: archives/T5ynth-Linux-Base-x86_64-VST3.tar.xz

      - name: Upload Ubuntu DEB
        uses: actions/upload-artifact@v4
        with:
          name: T5ynth-Ubuntu-x86_64-DEB
          path: archives/deb/*.deb

  # ── Release (only on tags) ──────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Archives are pre-built on each platform to preserve Unix permissions
      - name: Collect archives
        run: |
          mkdir -p release
          find artifacts -name '*.pkg' -exec mv {} release/ \;
          find artifacts -name 'T5ynth-Windows-Setup.exe' -exec mv {} release/ \;
          ls -lh release/

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp .github/release_notes_header.md release_notes.md
          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ github.ref_name }}" \
            --jq '.body' >> release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE=""
          case "${{ github.ref_name }}" in
            *-rc*|*-alpha*|*-beta*) PRERELEASE="--prerelease" ;;
          esac
          gh release create "${{ github.ref_name }}" \
            release/*.pkg \
            release/*.exe \
            --title "T5ynth ${{ github.ref_name }}" \
            --notes-file release_notes.md \
            $PRERELEASE
